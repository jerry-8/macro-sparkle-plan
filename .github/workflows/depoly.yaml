# This is a basic workflow to help you get started with Actions

name: Deploy Lovable Application

on:
  push:
    branches:
      - main  # Triggers the build every time Lovable auto-syncs or code is pushed to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Matches Lovable's standard build environment
          cache: 'npm'
          cache-dependency-path: './dist/packages.lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          # Injects secrets securely into the Vite static build matrix
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist  # Lovable default build directory
